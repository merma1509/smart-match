services:
  smart-match:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./uploads:/app/uploads
    environment:
      - KMP_DUPLICATE_LIB_OK=TRUE
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G
    # Важно! Без этого ограничения Colima может убить контейнер
    mem_limit: 6g
    mem_reservation: 4g
